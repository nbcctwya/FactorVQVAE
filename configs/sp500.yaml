experiment:
  market: sp500
  stage2_seeds: [0, 1, 2, 3, 4]
  model: factorvqvae

paths:
  checkpoint_dir: outputs/sp500/checkpoints
  log_dir: outputs/sp500/tb_logs
  result_dir: outputs/sp500/results
  store_dir: outputs/sp500/store

data:
  provider_uri: ~/.qlib/qlib_data/us_data
  region: us
  universe: sp500
  prefix: US
  jkp_path: data/dataset/[usa]_[all_themes]_[daily]_[vw_cap].csv
  data_path: data
  window_size: 20
  window_fillna: ffill
  train_period: [2009-01-01, 2020-12-31]
  valid_period: [2021-01-01, 2022-12-31]
  test_period: [2023-01-01, 2025-12-31]
  handler_start: 2008-01-01
  # Extra dates are needed to realize labels for the last 2025 predictions.
  handler_end: 2026-01-15
  label: Ref($close, -2) / Ref($close, -1) - 1
  purge_label_days: 2

evaluation:
  benchmark: ^gspc
  deal_price: close
  limit_threshold: null

vqvae:
  input_channel: 1
  num_features: 158
  num_factors: 128
  hidden_size: 128
  num_elements: 64
  dropout: 0.1
  num_heads: 4
  alpha: 10
  market_features: 13

transformer:
  use_market: true
  # label(t) uses close(t+1:t+2), so at prediction t only <= t-2 is known.
  label_delay: 2
  num_tokens: 20
  hidden_size: 32
  heads: 4
  n_layers: 2
  ff_mult: 4
  pkeep: 1
  temperature: 1.0
  attn_pdrop: 0.5
  saved_model: stage1_best.ckpt
  rank_loss: true
  rank_loss_alpha: 0.1
  dec_warmup: 0
  eta: 1
  omega: 0.1

train:
  stage1_seed: 42
  seed: 42
  batch_size: 300
  learning_rate: 0.0001
  num_epochs: 100
  stage1_early_stop: 10
  stage2_early_stop: 15
  stage1_monitor: val_loss
  stage2_checkpoint_monitor: Val_RIC
  stage2_checkpoint_mode: max
  stage2_early_stop_monitor: val_loss
  stage2_early_stop_mode: min
  device: gpu
  devices: 1
  precision: 32
  num_workers: 4
  gradient_clip_val: 3.0
  project_name: FactorVQVAE
  run_name: automatic

quantizer:
  affine_lr: 2
  replace_freq: 20
  sync_nu: 2
  beta: 0.25
  kmeans_init: true
  norm:
  cb_norm:
